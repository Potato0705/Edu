# Phase 4 raw-only smoke baseline.
# Small debug split aligned with phase4_smoke.yaml, no PACE or hidden-evidence mutation.

model:
  name: "models/Meta-Llama-3.1-8B-Instruct"

data:
  asap_path: "data/raw/training_set_rel3.tsv"
  essay_set: 1
  score_min: 2
  score_max: 12

rag:
  enabled: false
  model_name: "all-MiniLM-L6-v2"
  n_retrieved: 10
  n_selected: 3
  use_rerank_train: false
  use_rerank_test: false
  rubric_driven_retrieval: false

induction:
  enabled: true
  n_high_samples: 3
  n_low_samples: 3
  official_criteria: "Evaluate the essay based on content, organization, and language use."

evolution:
  population_size: 2
  n_generations: 1
  n_static_exemplars: 4
  anchor_profile: "boundary"
  anchor_stratum_strategy: "score_band"
  anchor_boundary_mode: "mid_and_high"
  anchor_high_exact_top: true
  anchor_high_min_count: 5
  anchor_high_top_preference_prob: 0.75
  anchor_high_top_bonus: 0.25
  anchor_high_preserve_top_prob: 0.85
  anchor_low_exact_floor: false
  anchor_mutation_strategy: "evidence_representative"
  anchor_mutation_candidate_pool: 8
  anchor_mutation_hidden_rerank: false
  anchor_mutation_hidden_top_m: 3
  use_evidence_feedback: false
  use_evidence_anchor_slot: false
  evidence_anchor_slot_prob: 0.0
  n_elite_evolve: 1
  elite_diversity_max_score_gap: 0.20
  n_error_cases: 3
  max_workers: 1
  evolve_instruction: true
  evolve_static_exemplars: true
  raw_distribution_guard_enabled: true
  raw_distribution_tv_threshold: 0.35
  raw_distribution_penalty_weight: 0.15
  raw_bias_threshold: 1.5
  raw_bias_penalty_weight: 0.05
  raw_collapse_penalty_weight: 0.10
  raw_high_score_quantile: 0.75
  raw_high_recall_floor: 0.30
  raw_high_recall_penalty_weight: 0.12
  raw_high_bias_floor: -1.0
  raw_high_bias_penalty_weight: 0.04
  raw_require_max_score_when_present: true
  raw_max_score_recall_penalty_weight: 0.03
  max_score_contract_enabled: true
  max_score_contract_text: |
    The maximum score is attainable. Do not reserve the maximum score only for flawless essays. If the essay is comparable to or stronger than the high-score anchor in content, organization, and language use, assign a score near the top of the range, including the maximum score when appropriate.

llm:
  local_backend_enabled: true
  temperature_scoring: 0.0
  temperature_induce: 0.8
  max_exemplar_length: 400

output:
  verbose: true

debug:
  enabled: true
  stratified: true
  seed: 42
  n_train: 120
  n_val: 16
  n_test: 16

pace:
  enabled: false
  model_path: "models/Meta-Llama-3.1-8B-Instruct"
  load_in_4bit: false
  dtype: "bfloat16"
  final_pace_calibrated: false
  raw_guard_enabled: true
  raw_guard_margin: 0.03
  raw_adjusted_guard_margin: 0.04
  selection_max_distribution_penalty: 0.15
  score_collapse_threshold: 0.75
