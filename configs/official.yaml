# WISE-AES 实验配置文件

# LLM 模型配置
model:
  # name: "meta-llama/llama-3.3-70b-instruct"
  # name: "meta-llama/llama-3.1-8b-instruct"
  # provider: "cerebras/fp16"

  name: "deepseek/deepseek-v3.2"
  # provider: "novita/fp8"
  provider: "baseten/fp4"

# 数据配置
data:
  asap_path: "data/raw/training_set_rel3.tsv"
  essay_set: 8
  score_min: 0
  score_max: 60

# RAG (检索增强生成) 配置 [NEW]
rag:
  enabled: true                        # [总开关] RAG 是否开启
  model_name: "all-MiniLM-L6-v2"
  
  # 数量控制
  n_retrieved: 10                      # 向量检索取回数量 (候选池)
  n_selected: 5                        # 最终使用的数量
  
  # [NEW] Rerank 阶段控制
  # 训练/进化阶段：建议 false (为了速度和进化信号的稳定性)
  use_rerank_train: false              
  # 推理/测试阶段：建议 true (为了最高精度，作为 TTA)
  use_rerank_test: true                
  
  rubric_driven_retrieval: true


# 指令诱导配置
induction:
  enabled: true
  n_high_samples: 3
  n_low_samples: 3
  official_criteria: |
    Score 0-60.
    CRITERIA:
    1. Content: Clarity, depth, and relevance of ideas.
    2. Organization: Structure, flow, and coherence.
    3. Language: Grammar, vocabulary range, and mechanics.

# 进化算法配置
evolution:
  population_size: 8                   # 种群大小
  n_generations: 50                    # 进化代数
  n_static_exemplars: 9                # [修改] 静态 ICL 范文数量 (Global Anchors)
  elite_ratio: 0.25
  mutation_rate: 0.3
  tournament_size: 3
  n_elite_evolve: 2
  n_error_cases: 5
  max_workers: 20                      # 并发线程数 (建议 5-20，取决于 API Rate Limit)

# LLM 配置
llm:
  temperature_scoring: 0.0             # 打分必须 0 温
  max_retries: 2

# 输出配置
output:
  verbose: true

# [NEW] 调试/非正式实验模式配置
debug:
  enabled: false                        # 是否开启调试模式
  n_train: 400                          # 调试模式下：训练集大小 (RAG 知识库)
  n_val: 32                             # 调试模式下：验证集大小 (进化评估用，最耗钱的部分)
  n_test: 100                            # 调试模式下：测试集大小 (最终评估用)
