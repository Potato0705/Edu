# Ultra-small local real-LLM micro gate for RTX 4060 8GB.
# This only checks runtime and gross method behavior; do not use as paper evidence.

model:
  name: models/Meta-Llama-3.1-8B-Instruct

data:
  asap_path: data/raw/training_set_rel3.tsv
  essay_set: 1
  score_min: 2
  score_max: 12

induction:
  enabled: false
  official_criteria: >
    Evaluate the essay holistically based on content, organization, and language
    use. Reward clear position, relevant development, coherent organization,
    sentence control, and effective language. Penalize thin development,
    weak organization, severe language problems, and off-topic responses.

anchor_budget:
  methods:
    - static_k_anchor
    - retrieval_k_anchor
    - coverage_first_sisa_k_anchor
  k_values: [9]
  full_static_per_score: 1
  stability_retrieval:
    n_bootstrap: 3
    sample_ratio: 0.75
    per_slot_top_n: 4
    rank_variance_weight: 0.10
    redundancy_weight: 0.15
  coverage_first_sisa:
    target_ladder_strategy: auto
    candidate_pool_per_score: 4
    retrieval_weight: 0.45
    stability_weight: 0.25
    influence_weight: 0.20
    diversity_weight: 0.08
    token_weight: 0.02
    loo_enabled: true
    loo_max_anchors: 3
    loo_max_items: 4

bapr:
  val_diag_ratio: 0.5

llm:
  local_backend_enabled: true
  temperature_scoring: 0.0
  max_new_tokens_scoring: 48
  max_new_tokens_reflection: 128
  max_new_tokens_induction: 128
  protocol_cache_enabled: true

output:
  root: logs/anchor_budget_coverage_first_sisa_local_micro
  verbose: false

debug:
  enabled: true
  stratified: true
  seed: 42
  n_train: 80
  n_val: 6
  n_test: 6

pace:
  enabled: false
  model_path: models/Meta-Llama-3.1-8B-Instruct
  load_in_4bit: true
  dtype: bfloat16
  final_pace_calibrated: false

evolution:
  max_score_contract_enabled: true
  max_score_contract_text: |
    The maximum score is attainable. Do not reserve the maximum score only for flawless essays. If the essay is comparable to or stronger than the high-score anchor in content, organization, and language use, assign a score near the top of the range, including the maximum score when appropriate.

rag:
  enabled: false
