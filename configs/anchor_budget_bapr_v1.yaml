# BAPR-v1 smoke / pilot config.
# This runs one-step boundary-aware anchor-bank repair without instruction
# evolution, hidden-evidence mutation, contrastive anchors, or final calibration.

model:
  name: models/Meta-Llama-3.1-8B-Instruct

data:
  asap_path: data/raw/training_set_rel3.tsv
  essay_set: 1
  score_min: 2
  score_max: 12

induction:
  enabled: false
  official_criteria: >
    Evaluate the essay holistically based on content, organization, and language
    use. Reward clear position, relevant development, coherent organization,
    sentence control, and effective language. Penalize thin development,
    weak organization, severe language problems, and off-topic responses.

anchor_budget:
  methods:
    - bapr_repair_k_anchor
  k_values: [9]
  full_static_per_score: 3
  representation:
    mode: local_hidden
    max_candidates_per_score: 8
    max_val_representations: 32
    token_cost_penalty: 0.02
    retrieval_weight: 0.8
    representation_weight: 0.2
    fallback_margin: 0.08
    max_rep_replacements: 3

bapr:
  val_diag_ratio: 0.5
  max_children: 3
  guard:
    qwk_drop_tolerance: 0.02
    mae_increase_tolerance: 0.10

llm:
  local_backend_enabled: true
  temperature_scoring: 0.0
  max_new_tokens_scoring: 192
  max_new_tokens_reflection: 512
  max_new_tokens_induction: 512
  protocol_cache_enabled: true

output:
  root: logs/anchor_budget_bapr
  verbose: false

debug:
  enabled: true
  stratified: true
  seed: 42
  n_train: 240
  n_val: 96
  n_test: 64

pace:
  enabled: false
  model_path: models/Meta-Llama-3.1-8B-Instruct
  load_in_4bit: false
  dtype: bfloat16
  final_pace_calibrated: false

evolution:
  max_score_contract_enabled: true
  max_score_contract_text: |
    The maximum score is attainable. Do not reserve the maximum score only for flawless essays. If the essay is comparable to or stronger than the high-score anchor in content, organization, and language use, assign a score near the top of the range, including the maximum score when appropriate.

rag:
  enabled: false
