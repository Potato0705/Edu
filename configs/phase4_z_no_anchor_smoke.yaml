# Phase 4 smoke ablation: zero anchor-relative z block, keep raw/reasoning/objective/uncertainty.

model:
  name: "models/Meta-Llama-3.1-8B-Instruct"

data:
  asap_path: "data/raw/training_set_rel3.tsv"
  essay_set: 1
  score_min: 2
  score_max: 12

rag:
  enabled: false
  model_name: "all-MiniLM-L6-v2"
  n_retrieved: 10
  n_selected: 3
  use_rerank_train: false
  use_rerank_test: false
  rubric_driven_retrieval: false

induction:
  enabled: true
  n_high_samples: 3
  n_low_samples: 3
  official_criteria: "Evaluate the essay based on content, organization, and language use."

evolution:
  population_size: 2
  n_generations: 1
  n_static_exemplars: 4
  anchor_profile: "boundary"
  anchor_stratum_strategy: "score_band"
  anchor_boundary_mode: "mid_and_high"
  anchor_high_exact_top: true
  anchor_high_min_count: 5
  anchor_high_top_preference_prob: 0.75
  anchor_high_top_bonus: 0.25
  anchor_high_preserve_top_prob: 0.85
  anchor_low_exact_floor: false
  anchor_mutation_strategy: "evidence_representative"
  anchor_mutation_candidate_pool: 8
  anchor_mutation_hidden_rerank: true
  anchor_mutation_hidden_top_m: 3
  use_evidence_feedback: true
  use_evidence_anchor_slot: true
  n_elite_evolve: 1
  elite_diversity_max_score_gap: 0.20
  n_error_cases: 3
  max_workers: 1
  evolve_instruction: true
  evolve_static_exemplars: true
  raw_distribution_guard_enabled: true
  raw_distribution_tv_threshold: 0.35
  raw_distribution_penalty_weight: 0.15
  raw_bias_threshold: 1.5
  raw_bias_penalty_weight: 0.05
  raw_collapse_penalty_weight: 0.10
  raw_high_score_quantile: 0.75
  raw_high_recall_floor: 0.30
  raw_high_recall_penalty_weight: 0.12
  raw_high_bias_floor: -1.0
  raw_high_bias_penalty_weight: 0.04
  raw_require_max_score_when_present: true
  raw_max_score_recall_penalty_weight: 0.03
  max_score_contract_enabled: true

llm:
  local_backend_enabled: true
  temperature_scoring: 0.0
  temperature_induce: 0.8
  max_exemplar_length: 400
  max_new_tokens_scoring: 192
  max_new_tokens_reflection: 512
  max_new_tokens_induction: 512
  protocol_cache_enabled: true

output:
  verbose: true

debug:
  enabled: true
  stratified: true
  seed: 42
  n_train: 120
  n_val: 16
  n_test: 16

pace:
  enabled: true
  model_path: "models/Meta-Llama-3.1-8B-Instruct"
  load_in_4bit: false
  dtype: "bfloat16"
  top_k_pace: 1
  evidence_mode: "compact_manual"
  pace_result_cache_enabled: true
  trigger_mode: "top_k"
  include_raw_elite_buffer: 1
  raw_guard_enabled: true
  raw_guard_margin: 0.03
  raw_adjusted_guard_margin: 0.04
  selection_max_distribution_penalty: 0.15
  max_anchor_geometry_bonus: 0.02
  max_protocol_quality_lift: 0.02
  pace_guidance_weight: 0.00
  anchor_guidance_weight: 0.05
  final_pace_calibrated: false
  calib_split_ratio: 0.5
  alpha: 0.60
  beta: 0.25
  gamma: 0.10
  hidden_dim: 64
  epochs: 5
  lr: 0.001
  batch_size: 16
  lambda_qwk: 0.25
  use_compact_evidence: true
  use_enhanced_evidence: true
  evidence_include_raw_score: true
  evidence_blocks_enabled:
    raw: true
    anchor: false
    reasoning: true
    objective: true
    uncertainty: true
    stability: true
    enhanced_extra: true
  anchor_softmax_temperature: 0.10
  early_reject_enabled: true
  early_reject_mini_set_size: 4
  score_collapse_threshold: 0.75
  anchor_sep_threshold: 0.02
  early_qwk_threshold: -0.05
  cost_penalty_lambda: 0.02
  overfit_guard_enabled: true
  overfit_gap_threshold: 0.15
  overfit_penalty_weight: 0.20
  distribution_guard_enabled: true
  distribution_tv_threshold: 0.25
  distribution_penalty_weight: 0.20
  collapse_penalty_weight: 0.15
  max_score_overprediction_threshold: 3.0
  max_score_penalty_weight: 0.03
  evidence_diagnostics_top_n: 5
